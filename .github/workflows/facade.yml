name: facades

on:
  push:
    branches:
      - main
      - '*.x'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: true

    name: Facade DocBlocks

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: 8.2
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4 # v2
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: "composer config repositories.facade-documenter vcs git@github.com:laravel/facade-documenter.git && composer require --dev laravel/facade-documenter:dev-main"

      - name: Update facade docblocks
        run: php -f vendor/bin/facade.php -- Laravel\\Mcp\\Facades\\Mcp

      - name: Format with Pint
        run: vendor/bin/pint src/Facades/Mcp.php

      - name: Commit facade docblocks
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: Update facade docblocks
          file_pattern: src/
